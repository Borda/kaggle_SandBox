name: Install package

# see: https://help.github.com/en/actions/reference/events-that-trigger-workflows
on: # Trigger the workflow on push or pull request, but only for the main branch
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

defaults:
  run:
    shell: bash

jobs:
  pkg-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Check package
        run: uv run --group dev check-manifest

      - name: Create package
        run: uv build

      - name: Verify package
        run: uv run --group dev twine check dist/*

  pkg-install:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macOS-latest", "windows-latest"]
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Create package
        run: uv build

      - name: Try installing
        run: |
          uv run --with "$(python -c 'import glob; print(glob.glob("dist/*.whl")[0])')" \
            python -c "import challenge_xyz; print(challenge_xyz.__version__)"

      - name: Try editable install
        run: uv run --with-editable . python -c "import challenge_xyz ;  print(challenge_xyz.__version__)"

  watcher:
    runs-on: ubuntu-latest
    needs: ["pkg-install", "pkg-check"]
    if: always()
    steps:
      - run: echo "${{ needs.pkg-install.result }}"
      - name: failing...
        if: needs.pkg-install.result == 'failure'
        run: exit 1
      - name: cancelled or skipped...
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.pkg-install.result)
        timeout-minutes: 1
        run: sleep 90
